# Configuração de deploy na Netlify
# Projeto: WhatsCoach (TanStack Start + Nitro)
#
# O preset do Nitro é definido em código, no vite.config.ts:
#   nitro: { preset: "netlify" }
# (a variável de ambiente SERVER_PRESET NÃO é lida pelo @lovable.dev/vite-tanstack-config).
# Esse preset gera a Netlify Function de SSR e os assets estáticos em dist/.

[build]
  command = "bun run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# As variáveis de ambiente sensíveis (Supabase, etc.) devem ser configuradas
# no painel da Netlify em:
#   Site settings > Build & deploy > Environment > Environment variables
# Veja o arquivo .env.example para a lista completa.
